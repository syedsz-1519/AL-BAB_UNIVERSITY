<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALBAB - Password Reclamation</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            maroon: {
              DEFAULT: '#8B1A1A',
              hover: '#701414',
            },
            gold: {
              DEFAULT: '#C8A96E',
              light: '#DFCB9F',
              hover: '#B5965A',
            },
            parchment: '#1a1208',
            cream: '#FAF6EF',
          },
          fontFamily: {
            serif: ['"EB Garamond"', 'serif'],
            sans: ['"Inter"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        },
      },
    };
  </script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .serif-title {
      font-family: 'EB Garamond', serif;
    }
    .gold-border-input {
      background-color: #241b10;
      border: 1px solid #C8A96E;
      color: #FAF6EF;
      transition: all 0.3s ease;
    }
    .gold-border-input:focus {
      outline: none;
      border-color: #DFCB9F;
      box-shadow: 0 0 8px rgba(200, 169, 110, 0.4);
    }
  </style>
</head>
<body class="bg-parchment text-cream/90 min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden">
  
  <div class="absolute inset-0 bg-[radial-gradient(#C8A96E_1px,transparent_1px)] [background-size:32px_32px] opacity-[0.06] pointer-events-none"></div>

  <!-- Central Card -->
  <div class="relative w-full max-w-md bg-[#130d06] border-2 border-gold p-8 sm:p-10 rounded-sm shadow-2xl z-10 my-8">
    
    <div class="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-gold"></div>
    <div class="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-gold"></div>
    <div class="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-gold"></div>
    <div class="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-gold"></div>

    <div class="text-center mb-6 pb-4 border-b border-gold/20">
      <p class="text-xs uppercase tracking-[0.25em] font-mono text-gold-light mb-1 font-bold">ALBAB ACADEMIC WORLD</p>
      <h1 class="serif-title text-3xl font-black text-gold">Password Recovery</h1>
      <p class="text-xs text-stone-400 italic mt-1">Reclaim entry into the sacred halls of knowledge</p>
    </div>

    <!-- Toast container -->
    <div id="toast" class="hidden text-center text-xs font-mono mb-5 p-3 bg-red-950/40 text-red-300 border border-red-950 rounded-sm"></div>

    <!-- Main Recovery Form -->
    <div id="reclaim-panel" class="space-y-4">
      <form onsubmit="handleForgotPassword(event)" class="space-y-4">
        <div>
          <label class="block text-[10px] uppercase tracking-wider font-mono font-bold text-gold-light mb-1.5" for="reclaim-email">Registered Email Address</label>
          <input 
            type="email" 
            id="reclaim-email" 
            required 
            class="w-full px-3 py-2.5 gold-border-input text-sm rounded-xs font-mono"
            placeholder="scribe@albab.edu"
          />
        </div>

        <button 
          id="btn-reclaim"
          type="submit" 
          class="w-full py-3 bg-maroon hover:bg-gold hover:text-charcoal border border-transparent text-cream font-bold font-mono tracking-widest uppercase text-xs rounded-xs shadow-md transition-all duration-300 cursor-pointer"
        >
          Send Reset Link
        </button>
      </form>
    </div>

    <!-- Success Output Pane (Initially Hidden) -->
    <div id="success-panel" class="hidden space-y-6 text-center py-4">
      <div class="flex justify-center">
        <div class="w-12 h-12 rounded-full border-2 border-gold flex items-center justify-center text-gold bg-gold/10">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 19v-8.93a2 2 0 01.89-1.664l8-5.333a2 2 0 012.22 0l8 5.333A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-2.25-1.5a2 2 0 00-2.22 0l-2.25 1.5" />
          </svg>
        </div>
      </div>
      <h3 class="serif-title text-2xl font-bold text-gold">Check Your Inbox</h3>
      <p class="text-sm text-stone-300 leading-relaxed max-w-xs mx-auto">
        A sacred recovery epistle has been dispatched to <span id="dispatch-email" class="text-gold font-bold">your email</span>. Follow the URL link inside to reset your token.
      </p>
      <p class="text-[10px] font-mono text-stone-500 uppercase tracking-widest italic">Note: Recovery links expire in exactly 1 hour.</p>
    </div>

    <!-- Navigation Redirect links -->
    <div class="text-center pt-6 mt-6 border-t border-gold/10">
      <a href="/login.html" class="text-xs text-gold font-mono font-bold hover:underline select-none">← Return to Login</a>
    </div>

  </div>

  <!-- ================= FIREBASE LIBRARIES ================= -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC_fi966iPaGIybf2XPue3TtutCmXgoQJg",
      authDomain: "my-first-project-494611.firebaseapp.com",
      projectId: "my-first-project-494611",
      storageBucket: "my-first-project-494611.firebasestorage.app",
      messagingSenderId: "27782445441",
      appId: "1:27782445441:web:4fe1df3f69f0b5bcc15080"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function displayToast(msg, isError = true) {
      const el = document.getElementById("toast");
      if (!msg) {
        el.classList.add("hidden");
        return;
      }
      el.textContent = msg;
      el.className = isError 
        ? "text-center text-xs font-mono mb-5 p-3 bg-red-950/40 text-red-300 border border-red-950 rounded-sm"
        : "text-center text-xs font-mono mb-5 p-3 bg-emerald-950/40 text-emerald-300 border border-emerald-950 rounded-sm";
      el.classList.remove("hidden");
    }

    function handleForgotPassword(event) {
      event.preventDefault();
      displayToast(null);

      const email = document.getElementById("reclaim-email").value.trim();
      const reclaimBtn = document.getElementById("btn-reclaim");
      reclaimBtn.disabled = true;
      reclaimBtn.textContent = "Dispatching...";

      auth.sendPasswordResetEmail(email)
        .then(() => {
          // Success state flip!
          document.getElementById("reclaim-panel").classList.add("hidden");
          document.getElementById("dispatch-email").textContent = email;
          document.getElementById("success-panel").classList.remove("hidden");
        })
        .catch((error) => {
          console.error("Forget Password error: ", error);
          displayToast(error.message || "Failed to dispatch recovery credential. Ensure email is correct.");
          reclaimBtn.disabled = false;
          reclaimBtn.textContent = "Send Reset Link";
        });
    }
  </script>
</body>
</html>
