<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALBAB - Administrative Genesis setup</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            maroon: {
              DEFAULT: '#8B1A1A',
              hover: '#701414',
            },
            gold: {
              DEFAULT: '#C8A96E',
              light: '#DFCB9F',
              hover: '#B5965A',
            },
            parchment: '#1a1208',
            cream: '#FAF6EF',
          },
          fontFamily: {
            serif: ['"EB Garamond"', 'serif'],
            sans: ['"Inter"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        },
      },
    };
  </script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .serif-title {
      font-family: 'EB Garamond', serif;
    }
    .gold-border-input {
      background-color: #241b10;
      border: 1px solid #C8A96E;
      color: #FAF6EF;
      transition: all 0.3s ease;
    }
    .gold-border-input:focus {
      outline: none;
      border-color: #DFCB9F;
      box-shadow: 0 0 8px rgba(200, 169, 110, 0.4);
    }
  </style>
</head>
<body class="bg-parchment text-cream/90 min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden">
  
  <div class="absolute inset-0 bg-[radial-gradient(#C8A96E_1px,transparent_1px)] [background-size:32px_32px] opacity-[0.06] pointer-events-none"></div>

  <!-- Central Card -->
  <div class="relative w-full max-w-md bg-[#130d06] border-2 border-gold p-8 sm:p-10 rounded-sm shadow-2xl z-10 my-8">
    
    <div class="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-gold"></div>
    <div class="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-gold"></div>
    <div class="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-gold"></div>
    <div class="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-gold"></div>

    <div class="text-center mb-6 pb-4 border-b border-gold/20">
      <p class="text-xs uppercase tracking-[0.25em] font-mono text-gold-light mb-1 font-bold">ALBAB ACADEMIC WORLD</p>
      <h1 class="serif-title text-2xl font-black text-gold">Admin Setup Genesis</h1>
      <p class="text-xs text-stone-400 italic mt-1">Initialize administrative authority with Master Credentials</p>
    </div>

    <!-- Toast container -->
    <div id="toast" class="hidden text-center text-xs font-mono mb-5 p-3 bg-red-950/40 text-red-300 border border-red-950 rounded-sm"></div>

    <form onsubmit="handleAdminSetup(event)" class="space-y-4">
      <div>
        <label class="block text-[10px] uppercase tracking-wider font-mono font-bold text-gold-light mb-1" for="admin-name">Full Administrative Name</label>
        <input 
          type="text" 
          id="admin-name" 
          required 
          class="w-full px-3 py-2 gold-border-input text-xs rounded-xs font-sans"
          placeholder="e.g. Scribe Registrar"
        />
      </div>

      <div>
        <label class="block text-[10px] uppercase tracking-wider font-mono font-bold text-gold-light mb-1" for="admin-email">Admin Email (scribe@albab.edu)</label>
        <input 
          type="email" 
          id="admin-email" 
          required 
          class="w-full px-3 py-2 gold-border-input text-xs rounded-xs font-mono"
          placeholder="scribe@albab.edu"
        />
      </div>

      <div>
        <label class="block text-[10px] uppercase tracking-wider font-mono font-bold text-gold-light mb-1" for="admin-password">Sacred Entry Password</label>
        <input 
          type="password" 
          id="admin-password" 
          required 
          minlength="8"
          class="w-full px-3 py-2 gold-border-input text-xs rounded-xs font-sans"
          placeholder="••••••••"
        />
      </div>

      <div>
        <label class="block text-[10px] uppercase tracking-wider font-mono font-bold text-gold-light mb-1" for="admin-master-key">Secret Master Genesis Key</label>
        <input 
          type="password" 
          id="admin-master-key" 
          required 
          class="w-full px-3 py-2 gold-border-input text-xs rounded-xs font-mono"
          placeholder="ALBAB_MASTER_..."
        />
      </div>

      <button 
        id="btn-submit"
        type="submit" 
        class="w-full py-2.5 bg-maroon hover:bg-gold hover:text-charcoal border border-transparent text-cream font-bold font-mono tracking-widest uppercase text-xs rounded-xs shadow-md transition-all duration-300 cursor-pointer"
      >
        Publish Admin Profile
      </button>

      <div class="text-center pt-2">
        <a href="/admin" class="text-[10px] font-mono text-gold hover:underline">← Cancel & Return to Sanctum</a>
      </div>
    </form>
  </div>

  <!-- ================= FIREBASE ================= -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC_fi966iPaGIybf2XPue3TtutCmXgoQJg",
      authDomain: "my-first-project-494611.firebaseapp.com",
      projectId: "my-first-project-494611",
      storageBucket: "my-first-project-494611.firebasestorage.app",
      messagingSenderId: "27782445441",
      appId: "1:27782445441:web:4fe1df3f69f0b5bcc15080"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.app().firestore("ai-studio-84f3f435-cf2f-41dd-89c2-149ce15246d0");
    const auth = firebase.auth();

    function displayToast(msg, isError = true) {
      const el = document.getElementById("toast");
      if (!msg) {
        el.classList.add("hidden");
        return;
      }
      el.textContent = msg;
      el.className = isError 
        ? "text-center text-xs font-mono mb-5 p-3 bg-red-950/40 text-red-300 border border-red-950 rounded-sm"
        : "text-center text-xs font-mono mb-5 p-3 bg-emerald-950/40 text-emerald-300 border border-emerald-950 rounded-sm";
      el.classList.remove("hidden");
    }

    function handleAdminSetup(event) {
      event.preventDefault();
      displayToast(null);

      const name = document.getElementById("admin-name").value.trim();
      const email = document.getElementById("admin-email").value.trim();
      const password = document.getElementById("admin-password").value;
      const masterKey = document.getElementById("admin-master-key").value.trim();

      const btn = document.getElementById("btn-submit");
      btn.disabled = true;
      btn.textContent = "Checking Genesis Master...";

      auth.createUserWithEmailAndPassword(email, password)
        .then((cred) => {
          return cred.user.updateProfile({ displayName: name })
            .then(() => {
              // Now set document in Firestore users under rule authorization
              const payload = {
                uid: cred.user.uid,
                email: email,
                phone: "+911111111111", // placeholder verified phone
                displayName: name,
                role: "admin",
                emailVerified: true,
                phoneVerified: true,
                profilePic: "avatar-1",
                enrolledCourses: [],
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                adminMasterKey: masterKey // Auth signature matching firestore rules validator
              };

              // Write administrative record
              return db.collection("users").doc(cred.user.uid).set(payload);
            });
        })
        .then(() => {
          displayToast("Administrative Genesis Authorized successfully! Routing to Admin Sanctum...", false);
          setTimeout(() => {
            window.location.href = "/admin";
          }, 1500);
        })
        .catch((err) => {
          console.error("Genesis system exception: ", err);
          displayToast("Genesis disapproved: " + err.message);
          btn.disabled = false;
          btn.textContent = "Publish Admin Profile";
        });
    }
  </script>
</body>
</html>
