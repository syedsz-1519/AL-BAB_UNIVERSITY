  <!-- Central Card -->
  <div class="relative w-full max-w-md bg-[#130d06] border-2 border-gold p-8 sm:p-10 rounded-sm shadow-2xl z-10 my-8 text-center">
    
    <div class="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-gold"></div>
    <div class="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-gold"></div>
    <div class="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-gold"></div>
    <div class="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-gold"></div>

    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 rounded-full border-2 border-maroon flex items-center justify-center text-maroon bg-maroon/10">

    <p class="text-xs font-mono text-maroon uppercase tracking-[0.2em] mt-1 font-bold">Unsanctioned Path Segment</p>
    
    <p class="text-sm text-stone-400 leading-relaxed mt-4 mb-6">
      Your credential lacks the authorization level necessary to enter this sanctum or examine these administrative archives.
    </p>

    <!-- Quick action links -->
    <div class="space-y-3 pt-4 border-t border-gold/10">
      <a 
        href="/dashboard" 
        class="block w-full py-2.5 bg-maroon hover:bg-maroon-hover border border-transparent text-cream font-bold font-mono tracking-widest uppercase text-xs rounded-xs shadow-md transition-all duration-300 cursor-pointer"
      >
        Go to student dashboard
      </a>
      
      <button 
        onclick="firebase.auth().signOut().then(() => { window.location.href='/login.html'; })"
        class="block w-full py-2 bg-transparent border border-gold/20 hover:border-gold/60 text-stone-300 font-bold font-mono tracking-wider uppercase text-[10px] rounded-xs transition-colors cursor-pointer"
      >
        Login as another account
      </button>
    </div>

  </div>
