<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Silver Metallic Gradient for Borders & Elements -->
    <linearGradient id="silver-metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" />
      <stop offset="25%" stop-color="#94A3B8" />
      <stop offset="50%" stop-color="#F8FAFC" />
      <stop offset="75%" stop-color="#64748B" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>

    <!-- Deep Red Metallic Gradient for Inner Background (Mapped to Emerald Green) -->
    <radialGradient id="crimson-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#146B41" />
      <stop offset="60%" stop-color="#0B4628" />
      <stop offset="100%" stop-color="#052012" />
    </radialGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="gold-metal" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7B3E" />
      <stop offset="50%" stop-color="#F3D082" />
      <stop offset="100%" stop-color="#C4A35A" />
    </linearGradient>

    <!-- Drop Shadows for Elegance and Depth -->
    <filter id="subtle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- OUTER POLISHED SILVER RIM WITH EMBOSS EFFECT -->
  <circle cx="256" cy="256" r="248" fill="#1E293B" filter="url(#subtle-shadow)" />
  <circle cx="256" cy="256" r="242" fill="url(#silver-metal)" />
  <circle cx="256" cy="256" r="236" fill="#0F172A" />

  <!-- DEEP METALLIC RED INNER SHIELD -->
  <circle cx="256" cy="256" r="198" fill="url(#silver-metal)" />
  <circle cx="256" cy="256" r="192" fill="url(#crimson-radial)" />

  <!-- CIRCULAR CURVED TEXT PATHS FOR THE SILVER OUTER BORDER -->
  <defs>
    <!-- Top-oriented text path (Clockwise Arc) -->
    <path id="text-arc-top" d="M 64,256 A 192,192 0 0,1 448,256" fill="none" />
  </defs>

  <!-- UNIVERSITY GOLD/SILVER NAME CURVING ACROSS THE TOP INNER RIM -->
  <text font-family="'Cinzel', 'Playfair Display', 'Cormorant Garamond', 'Georgia', serif" font-weight="900" font-size="28" letter-spacing="5">
    <textPath href="#text-arc-top" startOffset="50%" text-anchor="middle" fill="url(#silver-metal)">
      ALBAB ISLAMIC UNIVERSITY
    </textPath>
  </text>

  <!-- DECORATIVE GLOBE/STAR EMBLEMS ON FLANKS -->
  <!-- Left Side Star -->
  <g transform="translate(68, 256) scale(0.8)">
    <circle cx="0" cy="0" r="12" fill="url(#silver-metal)" />
    <circle cx="0" cy="0" r="10" fill="#0F172A" />
    <path d="M-6,0 Q0,-2 6,0 Q0,2 -6,0 M0,-6 Q2,0 0,6 Q-2,0 0,-6" fill="url(#silver-metal)" />
  </g>
  <!-- Right Side Star -->
  <g transform="translate(444, 256) scale(0.8)">
    <circle cx="0" cy="0" r="12" fill="url(#silver-metal)" />
    <circle cx="0" cy="0" r="10" fill="#0F172A" />
    <path d="M-6,0 Q0,-2 6,0 Q0,2 -6,0 M0,-6 Q2,0 0,6 Q-2,0 0,-6" fill="url(#silver-metal)" />
  </g>

  <!-- ================= INNER CONTENT AREA ================= -->

  <!-- 1. CRESCENT MOON & STAR AT THE TOP (CENTERED) UNDER CHROME GLOW -->
  <g transform="translate(256, 128)" filter="url(#glow)">
    <!-- Crescent Path -->
    <path d="M 12,-18 A 20,20 0 1,0 -16,14 A 16,16 0 1,1 12,-18" fill="url(#silver-metal)" />
    <!-- 5-Pointed Star -->
    <polygon points="12,-12 15,-6 22,-6 17,-2 19,4 12,0 5,4 7,-2 2,-6 9,-6" fill="url(#silver-metal)" />
  </g>

  <!-- 2. TRADITIONAL ARABIC CALLIGRAPHY IN WHITE & SILVER GLOW -->
  <!-- Text: "طلب العلم فريضة على كل مسلم" (Islamic Mandate on Sacred Study) -->
  <text x="256" y="215" font-family="'Amiri', 'Traditional Arabic', 'Georgia', serif" font-weight="bold" font-size="34" fill="#FFFFFF" text-anchor="middle" filter="url(#subtle-shadow)">
    طلب العلم فريضة على كل مسلم
  </text>

  <!-- 3. CENTRAL SACRED ARCH/DOME STRUCTURE (MULTIPLE SHIELDS) -->
  <g transform="translate(256, 310)" filter="url(#subtle-shadow)">
    <!-- Outer Arch -->
    <path d="M -54,60 L -54,20 C -54,-45 54,-45 54,20 L 54,60" fill="none" stroke="url(#silver-metal)" stroke-width="7" stroke-linecap="round" />
    <!-- Middle Arch -->
    <path d="M -42,60 L -42,22 C -42,-32 42,-32 42,22 L 42,60" fill="none" stroke="url(#silver-metal)" stroke-width="4" stroke-linecap="round" />
    <!-- Inner Arch Frame -->
    <path d="M -30,60 L -30,24 C -30,-18 30,-18 30,24 L 30,60" fill="none" stroke="url(#silver-metal)" stroke-width="2" stroke-linecap="round" stroke-dasharray="2,3" />

    <!-- MINI SPHERE/EARTH GLOBE AT THE LOGO CRADLE -->
    <circle cx="0" cy="30" r="18" fill="url(#silver-metal)" />
    <circle cx="0" cy="30" r="16" fill="#0B4628" />
    <!-- Stylized Silver Continents inside the Earth -->
    <path d="M -10,26 Q -4,22 2,24 Q 8,26 12,32 Q 4,34 -4,34 Q -10,32 -10,26 Z" fill="url(#silver-metal)" />
    <path d="M -8,38 Q -2,42 6,38 Q 4,32 -2,32 Q -6,34 -8,38 Z" fill="url(#silver-metal)" />
    <path d="M 6,24 Q 10,26 14,24 Q 12,20 8,20 Q 4,22 6,24 Z" fill="url(#silver-metal)" />
  </g>

  <!-- 4. EMBOSS OPEN BOOK AT THE BOTTOM (REPRESENTING HOLY TEXTS) -->
  <g transform="translate(256, 388)" filter="url(#subtle-shadow)">
    <!-- Book Base Spine -->
    <path d="M -68,26 Q 0,16 68,26 L 68,20 Q 0,10 -68,20 Z" fill="url(#gold-metal)" />
    <polygon points="0,14 -4,25 0,22 4,25" fill="url(#gold-metal)" />

    <!-- Left Book Pages -->
    <path d="M 0,14 C -22,14 -45,-2 -76,6 L -76,0 C -45,-8 -22,8 0,8 Z" fill="url(#silver-metal)" />
    <path d="M 0,12 C -21,12 -44,-4 -75,4 L -75,-2 C -44,-10 -21,6 0,6 Z" stroke="#1E293B" stroke-width="0.5" fill="#FFFFFF" />

    <!-- Right Book Pages -->
    <path d="M 0,14 C 22,14 45,-2 76,6 L 76,0 C 45,-8 22,8 0,8 Z" fill="url(#silver-metal)" />
    <path d="M 0,12 C 21,12 44,-4 75,4 L 75,-2 C 44,-10 21,6 0,6 Z" stroke="#1E293B" stroke-width="0.5" fill="#FFFFFF" />

    <!-- Page Lines Decoration -->
    <path d="M -15,5 Q -35,0 -60,5" stroke="url(#silver-metal)" stroke-width="1.5" fill="none" opacity="0.6" />
    <path d="M -15,1 Q -35,-4 -60,1" stroke="url(#silver-metal)" stroke-width="1.5" fill="none" opacity="0.6" />
    <path d="M 15,5 Q 35,0 60,5" stroke="url(#silver-metal)" stroke-width="1.5" fill="none" opacity="0.6" />
    <path d="M 15,1 Q 35,-4 60,1" stroke="url(#silver-metal)" stroke-width="1.5" fill="none" opacity="0.6" />
  </g>
</svg>
